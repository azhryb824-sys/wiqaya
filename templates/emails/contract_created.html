<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Cairo, Arial; background:#f5f5f5; padding:20px;">

    <div style="max-width:600px;margin:auto;background:white;padding:30px;border-radius:10px">

        <h2 style="color:#7a1f1f;">منصة وقاية</h2>

        <p>مرحباً {{ client_name }} 👋</p>

        <p>تم إنشاء عقد جديد برقم:</p>

        <h3 style="color:#333;">{{ contract_number }}</h3>

        <p>
            المبنى: {{ building_name }}<br>
            الموقع: {{ building_location }}
        </p>

        <div style="margin:30px 0;">
            <a href="{{ action_url }}"
               style="background:#7a1f1f;color:white;padding:12px 20px;text-decoration:none;border-radius:6px;">
               عرض العقد
            </a>
        </div>

        <hr>

        <p style="font-size:12px;color:#999;">
            هذه رسالة آلية من منصة وقاية
        </p>

    </div>

</body>
</html>

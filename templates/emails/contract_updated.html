<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family:Cairo, Arial;background:#f5f5f5;padding:20px">
    <div style="max-width:600px;margin:auto;background:white;padding:25px;border-radius:10px">
        <h2 style="color:#7a1f1f;">منصة وقاية</h2>

        <p>مرحباً {{ client_name }} 👋</p>

        <p>تم تحديث عقدك:</p>

        <ul>
            <li>📄 رقم العقد: {{ contract_number }}</li>
            <li>🏢 المبنى: {{ building_name }}</li>
            <li>📍 الموقع: {{ building_location }}</li>
        </ul>

        <div style="margin-top:20px">
            <a href="{{ action_url }}"
               style="background:#7a1f1f;color:white;padding:10px 20px;border-radius:6px;text-decoration:none;">
               عرض العقد
            </a>
        </div>

        <hr>

        <p style="font-size:12px;color:#999">
            هذه رسالة آلية من منصة وقاية
        </p>
    </div>
</body>
</html>

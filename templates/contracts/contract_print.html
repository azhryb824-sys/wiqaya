<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طباعة عقد الصيانة</title>
    <style>
        @page {
            size: A4 portrait;
            margin: 16mm 14mm 16mm 14mm;
        }

        html, body {
            margin: 0;
            padding: 0;
            font-family: "Cairo", Arial, sans-serif;
            direction: rtl;
            background: #ececec;
            color: #111;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-size: 15px;
            line-height: 2;
        }

        .screen-toolbar {
            width: 210mm;
            margin: 18px auto 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .print-btn,
        .back-btn,
        .pdf-btn {
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .print-btn {
            background: #7a0f1d;
            color: #fff;
        }

        .back-btn {
            background: #fff;
            color: #222;
            border: 1px solid #ddd;
        }

        .pdf-btn {
            background: #c62828;
            color: #fff;
        }

        .a4-wrapper {
            display: flex;
            justify-content: center;
            padding: 16px 0 28px;
        }

        .page {
            width: 210mm;
            background: #fff;
            box-shadow: 0 0 24px rgba(0, 0, 0, 0.10);
        }

        .page-inner {
            padding: 18mm 16mm 14mm;
        }

        @media print {
            .screen-toolbar {
                display: none !important;
            }
        }
    </style>
</head>
<body>

<!-- ✅ تم الإصلاح هنا -->
<div class="screen-toolbar">
    <a href="{% url 'contracts:contract_detail' contract.id %}" class="back-btn">رجوع</a>

    <button type="button" class="print-btn" onclick="window.print()">
        طباعة العقد
    </button>

    <a href="{% url 'contracts:contract_download' contract.id %}" class="pdf-btn">
        تنزيل الملف PDF
    </a>
</div>

<div class="a4-wrapper">
    <div class="page">
        <div class="page-inner">

            <h2 style="text-align:center;">
                عقد صيانة رقم {{ contract.contract_number }}
            </h2>

            <p>
                الطرف الأول: {{ contract.institution.name }}
            </p>

            <p>
                الطرف الثاني: {{ contract.second_party_name }}
            </p>

            <p>
                المبنى: {{ contract.building_name }}
            </p>

            <p>
                البداية: {{ contract.start_date }}
            </p>

            <p>
                النهاية: {{ contract.end_date }}
            </p>

        </div>
    </div>
</div>

</body>
</html>

{% extends "core/dashboard_base.html" %}

{% block title %}ملاحظات الزيارة | منصة وقاية{% endblock %}
{% block page_title %}ملاحظات الزيارة{% endblock %}
{% block page_subtitle %}إضافة أو تعديل ملاحظات الفني{% endblock %}

{% block dashboard_content %}
<div class="panel-card">
    <div class="panel-card-body">
        <form method="post" class="styled-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-main">حفظ الملاحظات</button>
        </form>
    </div>
</div>
{% endblock %}
